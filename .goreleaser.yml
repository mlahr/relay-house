version: 2

project_name: relay-house

builds:
  - id: relay-house
    main: ./cmd/server
    binary: relay-house
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: tarball
    ids:
      - relay-house
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: deb
    package_name: relay-house
    ids:
      - relay-house
    formats:
      - deb
    maintainer: "Michael Lahr"
    description: "Self-hosted email relay for browser-based website forms."
    homepage: "https://github.com/mlahr/relay-house"
    section: mail
    priority: optional
    bindir: /usr/bin
    dependencies:
      - adduser
      - ca-certificates
      - lsb-base
    contents:
      - src: packaging/debian/relay-house.config.yaml
        dst: /etc/relay-house/config.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - src: packaging/debian/relay-house.default
        dst: /etc/default/relay-house
        type: config|noreplace
        file_info:
          mode: 0644
      - src: packaging/debian/relay-house.init
        dst: /etc/init.d/relay-house
        file_info:
          mode: 0755
      - src: packaging/debian/relay-house.service
        dst: /lib/systemd/system/relay-house.service
        file_info:
          mode: 0644
      - dst: /var/lib/relay-house
        type: dir
        file_info:
          mode: 0750
      - dst: /run/relay-house
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: packaging/debian/postinstall.sh
      preremove: packaging/debian/preremove.sh
      postremove: packaging/debian/postremove.sh

release:
  github:
    owner: mlahr
    name: relay-house
  extra_files:
    - glob: ./install.sh
