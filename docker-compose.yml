services:
  relay-house:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - email-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      DATABASE_PATH: /app/data/relay-house.db
    command: ["relay-house", "-config", "/app/config.yaml"]
    restart: unless-stopped

volumes:
  email-data:
